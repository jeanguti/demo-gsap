<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP - Demo</title>
    <style>
      body {
        background-color: #222;
        font-family: system-ui;
      }

      .box {
        width: 100px;
        height: 100px;
        border-radius: 12px;
        background-color: #09f;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
      gsap.to(".grid .box", {
        duration: 2,
        scale: 0.9,
        opacity: 0,
        stagger: {
          each: 0.5,
          repeat: -1,
          yoyo: true,
          grid: "auto",
          from: "edges",
        },
      });
    </script>
  </body>
</html>
