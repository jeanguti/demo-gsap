<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP - Demo</title>
    <style>
      body {
        background-color: #222;
        font-family: system-ui;
      }

      .box {
        width: 100px;
        height: 100px;
        border-radius: 12px;
        background-color: #09f;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
      gsap.to(".box", {
        x: 100,
        duration: 1,
        rotate: 360,
        scale: 0.5,
        stagger: {
          each: 0.2,
          repeat: -1,
          yoyo: true,
        },
      });
    </script>
  </body>
</html>
