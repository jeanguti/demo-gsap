<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP - Demo</title>
    <style>
      body {
        background-color: #222;
        font-family: system-ui;
      }

      .box {
        width: 100px;
        height: 100px;
        border-radius: 12px;
        background-color: #09f;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
      // gsap
      // animación: tween
      // FROM: Establece un estado inicial y anima hacia un estado final (estado base)
      //   gsap.from(".box", {
      //     x: 200,
      //   });

      // FROMTO: Anima de un estado inicial - Hacia un estado final
      //   gsap.fromTo(
      //     ".box",
      //     {
      //       x: 100,
      //     },
      //     {
      //       x: 300,
      //     }
      //   );

      // SET: establece las propiedades directamente
      gsap.set(".box", {
        x: 400,
      });

      // Similar con To
      //   gsap.to(".box", {
      //     x: 400,
      //     duration: 0
      //   })
    </script>
  </body>
</html>
