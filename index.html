<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP - Demo</title>
    <style>
      body {
        background-color: #222;
        font-family: system-ui;
        height: 2000px;
        margin: 0;
      }

      .box {
        width: 75px;
        height: 75px;
        border-radius: 12px;
        background-color: #09f;
        margin-bottom: 4px;

        &.purple {
          background-color: rebeccapurple;
        }

        &.yellow {
          background-color: yellow;
        }
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      #log {
        color: #fff;
      }

      h1 {
        color: white;
        text-wrap: balance;
        text-align: center;
        position: fixed;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12vw;
        width: 100%;
      }

      canvas {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        aspect-ratio: 1068/600;
      }
    </style>
  </head>
  <body>
    <h1 class="title">AirPods Pro</h1>
    <canvas id="hero"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script>
      // animación -> tween

      gsap.registerPlugin(SplitText, ScrollTrigger);

      gsap.to(".title", {
        scale: 1.5,
        autoAlpha: 0,
        scrollTrigger: {
          start: "center center",
          scrub: 0.5,
        },
      });

      const canvas = document.getElementById("hero");
      const ctx = canvas.getContext("2d");

      canvas.width = 1068;
      canvas.height = 600;

      const TOTAL_FRAMES = 65;

      const createURL = (frame) => {
        const id = frame.toString().padStart(4, "0");
        return `https://www.apple.com/105/media/us/airpods-pro/2022/d2deeb8e-83eb-48ea-9721-f567cf0fffa8/anim/hero/medium/${id}.png`;
      };

      const images = Array.from({ length: TOTAL_FRAMES }, (_, index) => {
        const img = new Image();
        img.src = createURL(index);
        return img;
      });

      const airpods = {
        frame: 0,
      };

      gsap.to(airpods, {
        frame: TOTAL_FRAMES - 1,
        ease: "none",
        snap: "frame",
        scrollTrigger: {
          scrub: 0.5,
        },
        onUpdate: render,
      });

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.drawImage(images[airpods.frame], 0, 0);
      }

      gsap.ticker.add(render);
